<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Translation — Rooms</title>
    <link rel="stylesheet" href="app.css" />
    <style>
      .room { display: flex; gap: 14px; align-items: center; }
      .room .qr { width: 72px; height: 72px; border-radius: 8px; border: 1px solid var(--line); image-rendering: pixelated; flex-shrink: 0; cursor: pointer; background:#fff; }
      .room .meta { flex: 1; min-width: 0; }
      .room .nm { font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; gap: 8px; }
      .room .nm .edit { cursor: pointer; color: var(--muted); font-size: 0.9rem; background:none;border:0;width:auto;padding:2px; }
      .room .id { color: var(--muted); font-size: 0.82rem; font-family: ui-monospace, monospace; }
      .room .st { font-size: 0.85rem; margin-top: 4px; }
      .room .acts { display: flex; gap: 8px; margin-top: 10px; }
      .room .acts button { width: auto; padding: 8px 12px; font-size: 0.82rem; font-weight: 600; }
      .empty { color: var(--muted); text-align: center; padding: 18px 0; font-size: 0.9rem; }
      .live-pill { color: #16a34a; font-weight: 700; }
      .idle-pill { color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="brand">
      <div class="logo">🗣️ Live Translation</div>
      <div class="tag">Create a room, show its QR, let people scan to join</div>
    </div>

    <div class="wrap">
      <div class="card">
        <h2>Create a room</h2>
        <p class="desc">Each room gets a unique code + QR. Everyone scans the same code, then picks Speaker or Listener.</p>
        <div class="join-row">
          <input id="name" placeholder="Room name (optional)" autocomplete="off" />
          <button class="btn-speaker" id="create">Create</button>
        </div>
        <p class="err" id="error"></p>
      </div>

      <div class="card">
        <h2>Rooms</h2>
        <div id="rooms"><p class="empty">Loading…</p></div>
      </div>
    </div>

    <script>
      const origin = location.origin;
      const joinLink = (id) => `${origin}/join.html?room=${encodeURIComponent(id)}`;
      const els = {
        name: document.getElementById('name'),
        create: document.getElementById('create'),
        rooms: document.getElementById('rooms'),
        error: document.getElementById('error'),
      };

      async function api(method, path, body) {
        const res = await fetch(path, {
          method,
          headers: body ? { 'Content-Type': 'application/json' } : undefined,
          body: body ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || res.statusText);
        return res.status === 204 ? null : res.json();
      }

      function render(rooms) {
        if (!rooms.length) {
          els.rooms.innerHTML = '<p class="empty">No rooms yet — create one above.</p>';
          return;
        }
        rooms.sort((a, b) => b.createdAt - a.createdAt);
        els.rooms.innerHTML = '';
        for (const r of rooms) {
          const status = r.live
            ? `<span class="live-pill">● live</span> · ${r.listeners} listener${r.listeners === 1 ? '' : 's'}`
            : `<span class="idle-pill">○ idle</span> · ${r.listeners} listener${r.listeners === 1 ? '' : 's'}`;
          const card = document.createElement('div');
          card.className = 'card';
          card.style.margin = '0 0 12px';
          card.innerHTML = `
            <div class="room">
              <img class="qr" src="/api/qr?data=${encodeURIComponent(joinLink(r.id))}" title="Open big QR screen" data-host="${r.id}" />
              <div class="meta">
                <div class="nm"><span>${escapeHtml(r.name)}</span><button class="edit" data-edit="${r.id}" title="Rename">✏️</button></div>
                <div class="id">${r.id}</div>
                <div class="st">${status}</div>
                <div class="acts">
                  <button class="btn-listener" data-copy="${r.id}">Copy link</button>
                  <button class="btn-ghost" data-host="${r.id}">QR screen</button>
                  <button class="btn-stop" data-del="${r.id}">Delete</button>
                </div>
              </div>
            </div>`;
          els.rooms.appendChild(card);
        }
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
      }

      async function refresh() {
        try {
          render(await api('GET', '/api/rooms'));
        } catch (e) {
          els.error.textContent = 'Could not load rooms: ' + e.message;
        }
      }

      els.create.addEventListener('click', async () => {
        els.error.textContent = '';
        try {
          const room = await api('POST', '/api/rooms', { name: els.name.value });
          els.name.value = '';
          await refresh();
          // Jump straight to the new room's QR screen so the host can show it.
          location.href = `host.html?room=${encodeURIComponent(room.id)}`;
        } catch (e) {
          els.error.textContent = 'Create failed: ' + e.message;
        }
      });
      els.name.addEventListener('keydown', (e) => { if (e.key === 'Enter') els.create.click(); });

      els.rooms.addEventListener('click', async (e) => {
        const t = e.target.closest('[data-host],[data-copy],[data-del],[data-edit]');
        if (!t) return;
        if (t.dataset.host) {
          location.href = `host.html?room=${encodeURIComponent(t.dataset.host)}`;
        } else if (t.dataset.copy) {
          try { await navigator.clipboard.writeText(joinLink(t.dataset.copy)); t.textContent = 'Copied ✓'; setTimeout(() => (t.textContent = 'Copy link'), 1200); } catch {}
        } else if (t.dataset.edit) {
          const name = prompt('Rename room', '');
          if (name && name.trim()) { await api('PATCH', `/api/rooms/${t.dataset.edit}`, { name: name.trim() }); refresh(); }
        } else if (t.dataset.del) {
          if (confirm('Delete this room? Anyone connected will be disconnected.')) {
            await api('DELETE', `/api/rooms/${t.dataset.del}`); refresh();
          }
        }
      });

      refresh();
      setInterval(refresh, 4000); // keep live status + listener counts fresh
    </script>
  </body>
</html>
