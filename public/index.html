<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Translation</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 480px; margin: 56px auto; padding: 0 16px; }
      h1 { font-size: 1.5rem; text-align: center; }
      p.sub { text-align: center; color: #6b7280; margin-top: -8px; }
      .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin: 20px 0; }
      .card h2 { font-size: 1.05rem; margin: 0 0 4px; }
      .card p { color: #6b7280; margin: 0 0 14px; font-size: 0.9rem; }
      button, .btn { font-size: 1rem; padding: 14px; width: 100%; box-sizing: border-box; border: 0; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; text-align: center; display: block; text-decoration: none; }
      .speaker { background: #2563eb; }
      .listener { background: #16a34a; }
      .join-row { display: flex; gap: 8px; }
      .join-row input { flex: 1; font-size: 1rem; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; text-transform: lowercase; }
      .join-row button { width: auto; padding: 12px 18px; }
    </style>
  </head>
  <body>
    <h1>🗣️ Live Translation</h1>
    <p class="sub">Real-time multilingual audio for presentation rooms</p>

    <div class="card">
      <h2>Host a room</h2>
      <p>Start speaking. Your audience scans a QR code to join and hears you in their own language.</p>
      <button class="speaker" id="host">Host a new room →</button>
    </div>

    <div class="card">
      <h2>Join a room</h2>
      <p>Enter the room code shared by the speaker (or just scan their QR code).</p>
      <div class="join-row">
        <input id="code" placeholder="room code" autocomplete="off" />
        <button class="listener" id="join">Join</button>
      </div>
    </div>

    <script>
      // Short, readable, unambiguous room id (no 0/o/1/l/i confusion).
      function newRoomId() {
        const alphabet = 'abcdefghjkmnpqrstuvwxyz23456789';
        let id = '';
        for (let i = 0; i < 6; i++) id += alphabet[Math.floor(Math.random() * alphabet.length)];
        return id;
      }

      document.getElementById('host').addEventListener('click', () => {
        location.href = 'speaker.html?room=' + newRoomId();
      });

      const code = document.getElementById('code');
      const go = () => {
        const id = (code.value || '').trim().toLowerCase();
        if (id) location.href = 'listener.html?room=' + encodeURIComponent(id);
      };
      document.getElementById('join').addEventListener('click', go);
      code.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
    </script>
  </body>
</html>
