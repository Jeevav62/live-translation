<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Speaker — Live Translation</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="brand">
      <div class="logo">🎤 Speaker</div>
      <div class="tag">Room <strong id="roomtag">—</strong></div>
    </div>

    <div class="wrap">
      <div class="card">
        <label for="lang">I will speak in</label>
        <select id="lang">
          <option value="hi">Hindi</option>
          <option value="en">English</option>
        </select>
        <button class="btn-speaker mt" id="go">Go Live</button>

        <div class="status">
          <div class="row"><span>Connection</span><strong><span class="dot" id="dot"></span><span id="conn">idle</span></strong></div>
          <div class="row"><span>Listeners</span><strong id="count">0</strong></div>
        </div>
        <p class="err" id="error"></p>
      </div>

      <div class="card qr-box">
        <h2>Audience joins by scanning this</h2>
        <img id="qr" alt="Room QR code" />
        <div class="roomcode">Room <span id="roomcode">—</span></div>
        <button class="btn-ghost mt" id="copy">Copy join link</button>
        <p class="hint">They scan, then pick their own language to hear.</p>
      </div>
    </div>

    <script type="module" src="speaker.js"></script>
  </body>
</html>
